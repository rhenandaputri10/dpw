<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pengaturan pada link</title>
    <style type="text/css">
        a:link { text-decoration: none; background-color: #fae6d2; color: #000000; } /* Tautan normal [cite: 333-336] */
        a:visited { text-decoration: none; color: #222; } /* Tautan yang sudah dikunjungi [cite: 340-342] */
        a:active { text-decoration: none; color: #660000; } /* Tautan saat diklik [cite: 337-339] */
        
        /* Efek saat kursor di atas tautan [cite: 346, 356-360] */
        a:hover {
            font-weight: bold;
            text-transform: uppercase; /* Mengubah teks jadi huruf kapital semua [cite: 357] */
            text-decoration: underline overline; /* Garis bawah dan atas [cite: 358] */
            color: #1022c8;
            background-color: #e4e5dd;
        }
    </style>
</head>
<body>
    <table border="0">
        <tr><td><a href="#">Arahkan mouse ke sini (Menu 1)</a></td></tr>
        <tr><td><a href="#">Arahkan mouse ke sini (Menu 2)</a></td></tr>
    </table>
</body>
</html>
