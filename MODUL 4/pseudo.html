<!DOCTYPE html>
<html>
<head>
    <title>Belajar Pseudo-class</title>
    <style>
        /* Sembunyikan paragraf secara default [cite: 74, 75] */
        p {
            display: none;
            background-color: darkgray;
            padding: 20px; 
        }

        /* Tampilkan paragraf saat div di-hover [cite: 80, 81] */
        div:hover p {
            display: block;
        }

        /* Tugas tambahan: Link berubah warna  */
        a:link { color: black; }
        a:hover { color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <div> 
        Letakkan kursor disini untuk melihat div element 
        <p>Saya adalah element p</p>
    </div>

    <br>
    <a href="#">Contoh Link (Arahkan mouse ke sini)</a>
</body>
</html>
