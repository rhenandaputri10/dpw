<html>
<head>
    <style>
        div {
            border: 1px solid;
            margin: 0 auto; /* Menengahkan elemen div [cite: 430] */
            height: 100px;
            width: 500px;
            background: lightyellow;
        }
        span {
            display: block; /* Mengubah span (inline) menjadi block [cite: 440] */
            background: lightgray;
        }
    </style>
</head>
<body>
    <div>
        Ini adalah elemen pertama menggunakan DIV [cite: 456]
        <div>Ini DIV di dalam DIV namun membuat elemen blok baru [cite: 457]</div>
        <span>Ini SPAN di dalam DIV yang dipaksa menjadi elemen blok baru</span>
    </div>
</body>
</html>
