<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tipe Input</title>
    <link rel="icon" type="" href="" sizes="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<br>
    

    <h3>Uji Coba 1</h3>
    <label for="username"> Masukkan sername:</label><br>
    <input type="text" name="username" id="username"><br>
    <label for="pwd"> Masukkn Password:</label><br>
    <input type="password" name="pwd" id="pwd"> </br>
    <br>

    <hr>
    <h3>Uji Coba 2</h3>
    <input type="radio" id="html" value="HTML"> 
    <label for="html">HTML</label><br>
    <input type="radio" id="css" value="CSS"> 
    <label for="css">CSS</label><br>
    <input type="radio" id="javascript" value="JavaScript"> 
    <label for="javascript">JAVASCRIPT</label>
    <P>Kesimpulan Uji Coba 2</P>

    <hr>
    <h3>Uji Coba 3</h3>
    <input type="checkbox" id="id1" value="Bike">
    <label for="id1">Bike</label><br>
    <input type="checkbox" id="id2" value="Car">
    <label for="id2">Car</label><br>
    <input type="checkbox" id="id3" value="Motorcycle">
    <label for="id3">Motorcycle</label><br>
    <p>Kesimpulan Uji Coba 3</p>

    <hr>
    <h3>Uji Coba 4</h3>
    <label for="favcolor">Warna Favorit</label>
    <input type="color" name="favcolor" id="favcolor"><br>
    <label for="date">Tanggal</label>
    <input type="date" name="tanggal"  id="date"><br>
    <input type="button" onclick="alert('Hello World!')" value="Click Me"><br>
    <p>Kesimpulan ketika ditekan</p>

    <hr>
    <h3>Uji Coba 5</h3>
    <label for="birthdaytime">Date time</label>
    <input type="datetime-local" name="birthdaytime" id="birthdaytime"><br>
    <label for="birthdaymonth">Month</label>
    <input type="month" name="birthdaymonth" id="birthdaytime"><br>
    <label for="email">Email</label>
    <input type="email" name="email" id="email"><br>
    <p>Kesimpulan Uji Coba 5</p>

    <hr>
    <h3>Uji Coba 6</h3>
    <label for="myfile">Pilih File:</label>
    <input type="image" src="" alt="" width="" height=""><br>
    <input type="file" name="myfile" id="myfile"><br>
    <input type="hidden" name="custId" id="custId"><br>
    <p>Kesimpulan Uji Coba 6</p>

    <hr>
    <h3>Uji Coba 7</h3>
    <label for="quantity">Quantity (Dibatasi 1 - 5): </label>
    <input type="number" name="quantity" id="quantity" min="1" max="5"><br>
    <label for="vol">Volume (Dibatasi 0 - 50):</label>
    <input type="range" name="vol" id="vol" min="0" max="50">

    <hr>
    <h3>Uji Coba 8</h3>
    <label for="homepage">Homepage</label>
    <input type="ur" name="homepage" id="homepage"><br>
    <label for="gsearch">Search Google</label>
    <input type="search" name="gsearch" id="gsearch"><br>
    <label for="ph">Phone Number</label>
    <input type="tel" name="ph" id="ph" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"><br>
    <p>Kesimpulan Uji Coba 8</p>

    <hr>
    <h3>Uji Coba 9</h3>
    <label for="appt"> Select time:</label>
    <input type="time" name="appt" id="ppt"><br>
    <label for="week">Select week:</label>
    <input type="week" name="week" id="week"><br>
    <p>Kesimpulan Uji Coba 9</p>

</body>
</html>
