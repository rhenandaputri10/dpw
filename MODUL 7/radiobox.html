<html>

<head>
    <title>Mengakses Objek radio</title>
</head>

<body>
    Tipe musik apa yang anda sukai?<br>
    <form name="formTes">
        <input type="radio" name="radioMusik" value="POP" onclick="info()">POP<br>
        <input type="radio" name="radioMusik" value="HIPHOP" onclick="info()">HIPHOP<br>
        <input type="radio" name="radioMusik" value="BALAD" onclick="info()">BALAD<br>
        <input type="radio" name="radioMusik" value="Lainnya" onclick="info()">Lainnya<br>
        <hr>
        Info: <input type="text" name="fieldMusik" size="40">
    </form>

    <script language="JavaScript">
        function info() {

            for (var i = 0; i < 4; i++) {

                if (document.formTes.radioMusik[i].checked) {

                    document.formTes.fieldMusik.value = document.formTes.radioMusik[i].value;
                }
            }
        }
    </script>
</body>

</html>
