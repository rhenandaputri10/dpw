<html>
    <body>
        <h2>Javascript Confirm Box</h2>
        <button onclick="myFunction()">Klik disini</button>
        <p id="demo"></p>

        <script>
            function myFunction() {
                var txt;
                if(confirm ("Situs mungkin berbahaya. Apakah anda tetap akan melanjutkan?")) {
                    txt = "Anda mengklik OK";
                } else {
                    txt = "Anda mengklik Cancel";
                }
                document.getElementById("demo").innerHTML=txt
            }
        </script>
    </body>
</html>
