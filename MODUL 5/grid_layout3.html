!<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title> Belajar grid</title>
    
        <style>
            .grid-container {
                display: grid;
                grid-gap: 50px;
                background-color: #2196F3;
                grid-template-columns: auto auto auto auto;
                padding: 10px;
            }
            .item1 {
                background-color: rgba(201, 230, 251, 0.8);
                padding: 20px;
                font-size: 20px;
                text-align: center;
            }
            .item {
                background-color: rgba(112, 110, 253, 0.8);
                border: 2px solid ;
                padding: 20px;
                font-size: 30px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="grid-container">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item3">3</div>
            <div class="item4">4</div>
            <div class="item1">5</div>
            <div class="item1">6</div>
            <div class="item1">7</div>
            <div class="item1">8</div>
        </div>
        <div>Kesimpulan</div>
    </body>
</html>
